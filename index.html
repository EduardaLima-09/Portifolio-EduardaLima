<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Meu CSS-->
    <link rel="stylesheet" href="index.css">

    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <title>Maria Eduarda | Portfólio</title>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <img src="assets/Logo-FundoTransparente.svg" alt="Maria Eduarda" class="logo-img">
                    <a href="#home">Maria <span>Eduarda</span></a>
                </div>

                <div class="nav-menu" id="nav-menu">

                        <li><a href="#home" class="nav-link active">Início</a></li>

                <div class="nav-right">
                    <a href="#contato" class="btn-contato">Vamos conversar</a>

                </div>
            </div>

    </header>
    <!--Sessão 01(banner)-->
    <section id="banner" class="banner">
        <video class="banner-video" autoplay muted loop playsinline style="background-color: #f5c4c8;">
            <source src="assets/Header.mp4" type="video/mp4">
            <!-- Gif para navegadores que não suportam vídeo -->
            <img src="assets/header.gif" alt="Banner Maria Eduarda" class="banner-img">

<script src="script.js"></script>
